<style>
  /* Keep banner images at their original size */
  .post-meta .preview-img {
    width: auto !important;
    height: auto !important;
    aspect-ratio: unset !important;
  }
  .post-meta .preview-img img {
    width: auto !important;
    height: auto !important;
    max-width: 100%;
    object-fit: unset !important;
  }

  /* Expand TOC contents by default */
  .is-collapsed {
    max-height: 1000px !important;
  }

  /* Style h5/h6 entries in TOC (desktop) */
  .toc-list-item .toc-list-item .toc-list-item .toc-list-item .toc-link {
    font-size: 0.85em;
  }
  .toc-list-item .toc-list-item .toc-list-item .toc-list-item .toc-list-item .toc-link {
    font-size: 0.8em;
  }

  /* Style h5/h6 entries in TOC (mobile popup) */
  #toc-popup .node-name--H5 {
    padding-left: 4.5rem;
  }
  #toc-popup .node-name--H6 {
    padding-left: 5.625rem;
  }

  /* Bold h5/h6 in post content */
  .content h5,
  .content h6 {
    font-weight: 600;
  }

  /* Merge output blocks into preceding code blocks: remove gap and hide header */
  .highlighter-rouge + .language-plaintext {
    margin-top: -0.75rem;
  }
  .highlighter-rouge + .language-plaintext .code-header {
    display: none;
  }

  /* Hide line numbers on shell code blocks and align with plaintext blocks */
  .language-sh .rouge-gutter,
  .language-bash .rouge-gutter {
    display: none !important;
  }
  .language-sh .rouge-code,
  .language-bash .rouge-code {
    padding-left: 1.25rem !important;
  }

  /* Hide "Plaintext" label on untagged code blocks */
  [data-label-text="Plaintext"] {
    display: none;
  }

  /* Disable avatar zoom on hover */
  @media all and (min-width: 576px) {
    #sidebar #avatar img {
      transition: none;
    }
    #sidebar #avatar img:hover {
      transform: none;
    }
  }
</style>

<script>
  /* Extend TOC to support h5 and h6 headings (Chirpy only supports h2-h4) */
  window.addEventListener('load', function () {
    setTimeout(function () {
      if (typeof tocbot === 'undefined') return;
      var shared = {
        contentSelector: '.content',
        ignoreSelector: '[data-toc-skip]',
        headingSelector: 'h2, h3, h4, h5, h6',
        orderedList: false,
        scrollSmooth: false
      };
      tocbot.destroy();
      if (window.matchMedia('(min-width: 1200px)').matches) {
        tocbot.init(Object.assign({}, shared, {
          tocSelector: '#toc',
          headingsOffset: 32
        }));
      } else {
        tocbot.init(Object.assign({}, shared, {
          tocSelector: '#toc-popup-content',
          collapseDepth: 4,
          headingsOffset: 48
        }));
      }
    }, 500);
  });
</script>
